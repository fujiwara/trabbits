name: test
on: [push, pull_request]
permissions:
  contents: read
  pull-requests: write
jobs:
  test:
    strategy:
      matrix:
        go:
          - "1.25"
          - "1.26"
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Check out code into the Go module directory
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: run rabbitmq by compose
        run: |
          docker compose -f compose.yml up -d

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: ${{ matrix.go }}
        id: go

      - name: wait for started
        run: |
          sleep 10 # waiting for rabbitmq to start
          make setup-compose-cluster

      - name: test
        run: |
          make test-coverage

      - name: Display coverage
        run: |
          go tool cover -func=coverage.out

      - name: Generate coverage summary
        run: ./scripts/coverage-summary.sh coverage.out coverage_summary.md

      - name: Comment PR
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        if: github.event_name == 'pull_request' && matrix.go == '1.26'
        with:
          script: |
            const fs = require('fs');
            const coverage = fs.readFileSync('coverage_summary.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: coverage
            });

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: matrix.go == '1.26'
        with:
          name: coverage-report
          path: |
            coverage.out
            coverage.html
            coverage_summary.md

      - name: test rabbitmq directly
        run: |
          make test TEST_RABBITMQ=t

      - name: test upstreams down and bench upstream up
        run: |
          docker compose -f compose.yml down
          make -j run-servers-for-bench &

      - name: bench directly
        run: |
          make run-bench-rabbitmq

      - name: bench via trabbits
        run: |
          make run-bench-trabbits
